spring:
  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  application:
    name: ilumina-backend
  profiles:
    active: dev

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

info:
  app:
    name: ilumina-backend
    description: Backend da plataforma Ilumina

jwt:
  secret: ${JWT_SECRET:secretkeyiluminabemgrandeparafacilitaroteste}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

llm:
  provider: gemini
  api-key: ${GOOGLE_API_KEY:${GEMINI_API_KEY:}}
  model: gemini-2.5-flash-lite
  timeout-seconds: 30
  max-output-tokens: 4000
  rate-limit-per-minute: 5
