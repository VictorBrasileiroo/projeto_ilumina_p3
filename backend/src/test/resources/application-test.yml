spring:
  datasource:
    url: jdbc:h2:mem:ilumina_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

  sql:
    init:
      mode: never

jwt:
  secret: testsecretkeyiluminaverylongandsecure12345
  expiration: 86400000
  refresh-expiration: 604800000

llm:
  provider: gemini
  api-key: test-key
  model: gemini-2.5-flash-lite
  timeout-seconds: 30
  max-output-tokens: 4000
  rate-limit-per-minute: 5
